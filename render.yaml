services:
  - type: web
    name: clininotes-processing
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: PROCESSING_SERVICE_INTERNAL_TOKEN
        sync: false
      - key: WHISPER_MODEL_SIZE
        value: small
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: WHISPER_DEVICE
        value: cpu